apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: edge-cors-policy
  namespace: apps
plugin: edge-cors-policy
config:
  allowed_origins:
    - https://app.example.com
    - https://admin.example.com
  allow_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allow_headers:
    - Authorization
    - Content-Type
    - X-Request-Id
  expose_headers:
    - X-Request-Id
  allow_credentials: true
  max_age: 600
  reject_disallowed_origins: true
  reject_status_code: 403
  allow_private_network: false
