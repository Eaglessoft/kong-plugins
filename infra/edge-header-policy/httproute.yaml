apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: orders-api
  namespace: apps
  annotations:
    konghq.com/plugins: edge-header-policy
spec:
  parentRefs:
    - name: kong
      namespace: kong
  hostnames:
    - api.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: orders-api
          port: 80
